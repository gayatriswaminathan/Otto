name: eval

# Otto's quality moat (KAN-31 / G4): every push and PR runs the eval harness.
# If analyze() stops producing a required watermelon flag, this job fails and
# blocks the merge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: otto
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Otto eval harness
        run: node eval/eval.mjs
