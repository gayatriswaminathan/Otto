name: eval

# Otto's quality gates: every push and PR runs the eval harness, the
# dependency/readiness eval, and the brand-consistency gate. Any failure
# blocks the merge. Paths are relative to the repo root (which is the otto
# project itself).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Eval harness (watermelon flags)
        run: node eval/eval.mjs

      - name: Brand consistency gate
        run: node scripts/check-brand.mjs

      # Add once verified locally with: node eval/eval_deps.mjs
      # - name: Dependency + readiness eval
      #   run: node eval/eval_deps.mjs
